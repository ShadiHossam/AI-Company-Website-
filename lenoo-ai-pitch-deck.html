/* ============ TOKENS (LIGHT) ============ */
:root{
  --bg:#dfe7ea;
  --paper-alt:#f6fafb;
  --ink:#07222f;
  --ink-dim:#33505f;
  --muted:#5f7383;
  --muted-2:#93a4ae;
  --card:#ffffff;
  --card-2:#f4f8fa;
  --navy:#00253b;
  --deep:#001320;
  --teal:#006875;
  --teal-dark:#004f58;
  --cyan:#0097b0;
  --cyan-bright:#00cfe8;
  --mint:#0f9d63;
  --mint-soft:#e6f6ee;
  --amber:#c07000;
  --amber-soft:#fbf0e0;
  --line:#e4ebee;
  --line-strong:#d3dfe4;
  --teal-soft:rgba(0,104,117,.07);
  --teal-line:rgba(0,104,117,.20);
  --shadow:0 1px 2px rgba(7,34,47,.05),0 10px 30px -16px rgba(7,34,47,.16);
  --shadow-sm:0 1px 2px rgba(7,34,47,.05),0 4px 12px -8px rgba(7,34,47,.14);
  --serif:'Fraunces',Georgia,serif;
  --sans:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}

/* ============ STAGE / SLIDE FRAME ============ */
#viewport{position:fixed;inset:0;display:grid;place-items:center;}
#stage{
  width:1280px;height:720px;position:relative;
  transform-origin:center center;
  border-radius:16px;overflow:hidden;
  box-shadow:0 30px 90px -30px rgba(7,34,47,.5),0 0 0 1px rgba(7,34,47,.06);
}
.slide{
  position:absolute;inset:0;
  padding:44px 76px 66px;
  display:flex;flex-direction:column;
  background:linear-gradient(180deg,#ffffff 0%,#f6fafb 100%);
  opacity:0;visibility:hidden;
  transition:opacity .5s ease;
}
.slide.active{opacity:1;visibility:visible;}
.slide.hero{
  background:
    radial-gradient(90% 70% at 50% -8%,rgba(0,104,117,.12),transparent 60%),
    radial-gradient(70% 60% at 100% 105%,rgba(0,207,232,.10),transparent 55%),
    linear-gradient(175deg,#ffffff 0%,#eef5f7 100%);
}

/* ============ SHARED TYPE ============ */
.kicker{
  font-size:12.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--teal);display:flex;align-items:center;gap:11px;margin:0 0 20px;
}
.kicker::before{content:"";width:26px;height:2px;background:linear-gradient(90deg,var(--teal),rgba(0,104,117,0));border-radius:2px;}
.kicker .num{color:var(--muted-2);font-weight:600;letter-spacing:.12em;}
h1.title{font-family:var(--serif);font-weight:600;font-size:44px;line-height:1.06;margin:0;letter-spacing:-.015em;text-wrap:balance;color:var(--ink);}
.lead{font-size:20px;line-height:1.5;color:var(--ink-dim);max-width:62ch;font-weight:400;margin:18px 0 0;}
.em{color:var(--teal);font-weight:600;}
.em-mint{color:var(--mint);font-weight:600;}
strong{color:var(--ink);font-weight:700;}
.slide-body{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;}

/* ============ FOOTER CHROME ============ */
.foot{position:absolute;left:76px;right:76px;bottom:24px;display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--muted-2);letter-spacing:.04em;}
.foot .wm{display:flex;align-items:center;gap:9px;font-weight:600;color:var(--muted);letter-spacing:.02em;}
.foot .tag{text-transform:uppercase;letter-spacing:.16em;font-size:10.5px;font-weight:700;}
.foot-right{display:flex;align-items:center;gap:14px;}
.foot .pageno{font-variant-numeric:tabular-nums;font-weight:700;color:var(--muted);font-size:11px;letter-spacing:.06em;}
.slide-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex:none;}
.slide-header .cover-badge{align-self:auto;}

/* ============ LOGO MARK ============ */
.logomark{display:inline-flex;align-items:center;gap:13px;}
.logomark .glyph{width:38px;height:38px;flex:none;}
.logomark .wordmark{font-family:var(--sans);font-weight:800;font-size:23px;letter-spacing:-.01em;color:var(--ink);}
.logomark .wordmark b{color:var(--teal);font-weight:800;}

/* ============ CARDS / GRID ============ */
.grid{display:grid;gap:16px;}
.card{
  background:var(--card);
  border:1px solid var(--line);border-radius:15px;padding:22px 22px;
  position:relative;overflow:hidden;box-shadow:var(--shadow-sm);
}
.card .ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--teal-soft);border:1px solid var(--teal-line);margin-bottom:14px;}
.card .ic svg{width:19px;height:19px;stroke:var(--teal);}
.card h3{font-size:16.5px;margin:0 0 6px;color:var(--ink);font-weight:700;letter-spacing:-.01em;}
.card p{font-size:13.5px;line-height:1.5;color:var(--muted);margin:0;}
.card .tint{position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--teal),rgba(0,104,117,0) 70%);}

/* ============ STAT CARDS ============ */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.stat{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:26px 22px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);}
.stat .big{font-family:var(--serif);font-weight:600;font-size:46px;line-height:1;color:var(--navy);letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
.stat .big small{font-size:24px;color:var(--teal);font-family:var(--sans);font-weight:700;margin-left:2px;}
.stat .lab{font-size:13px;color:var(--muted);margin-top:12px;line-height:1.45;}
.stat::after{content:"";position:absolute;right:-30px;bottom:-30px;width:110px;height:110px;background:radial-gradient(circle,rgba(0,104,117,.06),transparent 70%);}

/* ============ PROCESS STEPS ============ */
.process{display:grid;grid-template-columns:repeat(5,1fr);gap:0;position:relative;margin-top:6px;}
.process::before{content:"";position:absolute;top:26px;left:8%;right:8%;height:2px;background:linear-gradient(90deg,var(--teal),var(--cyan),var(--mint));opacity:.55;}
.step{text-align:center;position:relative;padding:0 10px;}
.step .node{width:54px;height:54px;border-radius:50%;margin:0 auto 16px;display:grid;place-items:center;background:#fff;border:2px solid var(--teal);position:relative;z-index:2;box-shadow:0 0 0 6px #fff,0 8px 20px -8px rgba(0,104,117,.4);}
.step .node svg{width:24px;height:24px;stroke:var(--teal);}
.step h4{font-size:16px;margin:0 0 6px;color:var(--ink);font-weight:700;}
.step p{font-size:12px;line-height:1.45;color:var(--muted);margin:0;padding:0 4px;}

/* ============ LISTS ============ */
.blist{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:18px;}
.blist li{display:flex;gap:14px;font-size:17px;line-height:1.5;color:var(--ink-dim);align-items:flex-start;}
.blist li .mk{flex:none;width:24px;height:24px;border-radius:7px;background:var(--teal-soft);border:1px solid var(--teal-line);display:grid;place-items:center;margin-top:2px;}
.blist li .mk svg{width:14px;height:14px;stroke:var(--teal);}

/* ============ TWO COLUMN ============ */
.two{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;height:100%;}
.two.narrow{grid-template-columns:1.08fr .92fr;}

/* ============ USE CASE ROWS ============ */
.uc{display:flex;flex-direction:column;gap:12px;}
.ucRow{display:grid;grid-template-columns:210px 1fr 1fr;gap:0;align-items:stretch;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:var(--card);box-shadow:var(--shadow-sm);}
.ucRow .name{padding:16px 20px;background:var(--teal-soft);display:flex;align-items:center;font-weight:700;font-size:14.5px;color:var(--ink);gap:11px;border-right:1px solid var(--line);}
.ucRow .name .ic{width:30px;height:30px;border-radius:8px;background:#fff;border:1px solid var(--teal-line);display:grid;place-items:center;flex:none;}
.ucRow .name .ic svg{width:16px;height:16px;stroke:var(--teal);}
.ucRow .seg{padding:14px 20px;display:flex;flex-direction:column;justify-content:center;}
.ucRow .seg.b{border-right:1px solid var(--line);}
.ucRow .seg .t{font-size:10px;text-transform:uppercase;letter-spacing:.14em;font-weight:700;margin-bottom:5px;}
.ucRow .seg.b .t{color:var(--amber);}
.ucRow .seg.a .t{color:var(--mint);}
.ucRow .seg p{margin:0;font-size:13px;line-height:1.4;color:var(--ink-dim);}

/* ============ COMPARISON TABLE ============ */
.cmp{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;}
.cmp th,.cmp td{padding:13px 16px;text-align:left;border-bottom:1px solid var(--line);}
.cmp thead th{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;}
.cmp thead th.us{color:var(--teal);}
.cmp tbody td{color:var(--muted);vertical-align:middle;}
.cmp tbody td:first-child{color:var(--ink);font-weight:600;font-size:13.5px;}
.cmp col.uscol{background:var(--teal-soft);}
.cmp th.us,.cmp td.us{background:var(--teal-soft);text-align:center;}
.cmp td.us{color:var(--ink);font-weight:600;}
.cmp td.mid{text-align:center;}
.cmp .yes{color:var(--mint);font-weight:800;}
.cmp .no{color:var(--muted-2);}
.cmp tbody tr:last-child td{border-bottom:none;}

/* ============ TIMELINE ============ */
.tl{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.phase{border:1px solid var(--line);border-radius:15px;padding:24px 22px;position:relative;background:var(--card);box-shadow:var(--shadow-sm);}
.phase .ph{font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--teal);margin-bottom:5px;}
.phase .when{font-family:var(--serif);font-size:20px;color:var(--ink);font-weight:600;margin-bottom:14px;}
.phase ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px;}
.phase li{font-size:12.5px;line-height:1.4;color:var(--muted);padding-left:16px;position:relative;}
.phase li::before{content:"";position:absolute;left:0;top:6px;width:5px;height:5px;border-radius:50%;background:var(--teal);}
.phase.p1{border-top:3px solid var(--teal);}
.phase.p2{border-top:3px solid var(--cyan);}
.phase.p3{border-top:3px solid var(--mint);}
.phase .badge{position:absolute;top:20px;right:22px;font-size:26px;font-family:var(--serif);color:rgba(0,104,117,.16);font-weight:600;}

/* ============ REVENUE LADDER ============ */
.ladder{display:flex;flex-direction:column;gap:11px;}
.rung{display:grid;grid-template-columns:255px 1fr;gap:20px;align-items:center;padding:15px 22px;border-radius:13px;border:1px solid var(--line);background:var(--card);box-shadow:var(--shadow-sm);}
.rung .rl{display:flex;align-items:center;gap:13px;font-weight:700;font-size:15px;color:var(--ink);}
.rung .rl .n{width:28px;height:28px;border-radius:8px;background:var(--teal-soft);border:1px solid var(--teal-line);display:grid;place-items:center;font-size:12px;color:var(--teal);font-weight:800;flex:none;}
.rung p{margin:0;font-size:13px;color:var(--muted);line-height:1.45;}
.rung.core{background:linear-gradient(100deg,rgba(0,104,117,.09),#fff);border-color:var(--teal-line);}
.pill-core{font-size:9.5px;letter-spacing:.1em;color:var(--teal);border:1px solid var(--teal-line);border-radius:99px;padding:2px 8px;margin-left:6px;font-weight:800;}

/* ============ PLACEHOLDER STATES ============ */
.ph-box{border:1.5px dashed var(--teal-line);border-radius:13px;background:var(--teal-soft);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;gap:8px;color:var(--muted);}
.ph-box .t{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--teal);}
.ph-box .s{font-size:11px;line-height:1.4;color:var(--muted);max-width:24ch;}
.ph-box svg{width:22px;height:22px;stroke:var(--teal);}
.note-add{font-size:10.5px;color:var(--muted-2);font-style:italic;margin-top:10px;letter-spacing:.02em;}

/* proof */
.proofcards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.proof{border:1px solid var(--line);border-radius:13px;padding:18px 20px;background:var(--card);box-shadow:var(--shadow-sm);}
.proof .pn{font-family:var(--serif);font-size:34px;color:var(--teal);font-weight:600;line-height:1;}
.proof .pl{font-size:12px;color:var(--muted);margin-top:9px;line-height:1.4;}

/* segment cards */
.segs{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.seg-card{border:1px solid var(--line);border-radius:15px;padding:24px 22px;background:var(--card);box-shadow:var(--shadow-sm);}
.seg-card .ic{width:44px;height:44px;border-radius:11px;background:var(--teal-soft);border:1px solid var(--teal-line);display:grid;place-items:center;margin-bottom:15px;}
.seg-card .ic svg{width:23px;height:23px;stroke:var(--teal);}
.seg-card h3{font-size:16px;margin:0 0 8px;color:var(--ink);}
.seg-card p{font-size:12.5px;color:var(--muted);line-height:1.5;margin:0;}
.seg-card .eg{font-size:11.5px;color:var(--muted);margin-top:12px;padding-top:12px;border-top:1px solid var(--line);line-height:1.45;}
.seg-card .eg b{color:var(--ink-dim);font-weight:700;}

/* team */
.teamgrid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;height:100%;}
.founder{display:flex;gap:20px;align-items:flex-start;}
.founder .photo{width:96px;height:96px;border-radius:16px;flex:none;background:var(--card-2);border:1px solid var(--line);display:grid;place-items:center;color:var(--muted-2);font-size:10px;text-align:center;line-height:1.4;}
.roles{display:flex;flex-direction:column;gap:11px;}
.role{display:flex;gap:13px;align-items:center;padding:12px 16px;border:1px solid var(--line);border-radius:11px;background:var(--card);box-shadow:var(--shadow-sm);}
.role .ic{width:30px;height:30px;border-radius:8px;background:var(--teal-soft);display:grid;place-items:center;flex:none;}
.role .ic svg{width:16px;height:16px;stroke:var(--teal);}
.role .rt{font-size:14px;font-weight:700;color:var(--ink);}
.role .rs{font-size:11.5px;color:var(--muted);margin-top:2px;}

/* products */
.prodgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.prod{border:1px solid var(--line);border-radius:15px;overflow:hidden;background:var(--card);display:flex;flex-direction:column;box-shadow:var(--shadow-sm);}
.prod .body{padding:16px 18px;flex:1;display:flex;flex-direction:column;}
.prod h3{font-size:15px;margin:0 0 6px;color:var(--ink);}
.prod p{font-size:12px;color:var(--muted);line-height:1.45;margin:0;flex:1;}
.badge-st{align-self:flex-start;margin-top:13px;font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;font-weight:800;padding:4px 10px;border-radius:99px;background:var(--mint-soft);color:var(--mint);border:1px solid rgba(15,157,99,.25);}
.badge-st.beta{background:var(--amber-soft);color:var(--amber);border-color:rgba(192,112,0,.25);}

/* gtm funnel */
.funnel{display:flex;flex-direction:column;gap:9px;align-items:center;}
.frow{width:100%;display:flex;align-items:center;gap:16px;padding:13px 24px;border-radius:12px;border:1px solid var(--line);background:var(--card);box-shadow:var(--shadow-sm);}
.frow .fi{width:34px;height:34px;border-radius:9px;background:var(--teal-soft);display:grid;place-items:center;flex:none;}
.frow .fi svg{width:18px;height:18px;stroke:var(--teal);}
.frow .fx{font-weight:700;font-size:14.5px;color:var(--ink);}
.frow .fs{font-size:12px;color:var(--muted);margin-top:2px;}

/* ============ UI MOCKUPS (imagery) ============ */
.mkwin{background:#fff;border:1px solid var(--line);border-radius:11px;overflow:hidden;box-shadow:var(--shadow-sm);}
.mkbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--card-2);border-bottom:1px solid var(--line);}
.mkdot{width:8px;height:8px;border-radius:50%;background:#ccd7dc;}
.mkdot.on{background:#4ade80;}
.mktitle{font-size:10.5px;color:var(--muted);margin-left:6px;font-weight:600;}
.mkchat{padding:12px;display:flex;flex-direction:column;gap:7px;}
.bub{max-width:80%;font-size:10.5px;line-height:1.35;padding:7px 10px;border-radius:11px;}
.bub.in{background:var(--card-2);color:var(--ink-dim);align-self:flex-start;border-bottom-left-radius:3px;}
.bub.out{background:linear-gradient(135deg,var(--teal),#00879a);color:#fff;align-self:flex-end;border-bottom-right-radius:3px;}
.mkdash{padding:12px;display:flex;flex-direction:column;gap:10px;}
.mktiles{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.mktile{background:var(--card-2);border:1px solid var(--line);border-radius:8px;padding:8px 9px;}
.mktile b{font-size:16px;color:var(--teal);font-family:var(--serif);font-weight:600;}
.mktile i{display:block;font-size:8.5px;color:var(--muted);font-style:normal;margin-top:1px;letter-spacing:.02em;text-transform:uppercase;}
.mkbars{display:flex;align-items:flex-end;gap:6px;height:40px;padding-top:4px;}
.mkbars span{flex:1;background:linear-gradient(180deg,var(--cyan-bright),var(--teal));border-radius:3px 3px 0 0;}
.mkflow{display:flex;align-items:center;justify-content:center;gap:7px;padding:26px 10px;}
.fnode{background:var(--card-2);border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:10px;font-weight:700;color:var(--ink-dim);text-align:center;line-height:1.2;}
.fnode.ai{background:linear-gradient(135deg,var(--teal),#00879a);color:#fff;border-color:transparent;box-shadow:0 8px 16px -8px rgba(0,104,117,.55);}
.farrow{color:var(--teal);font-size:15px;font-weight:700;}

/* fragmented problem visual */
.frag{position:relative;height:100%;min-height:280px;border-radius:16px;background:linear-gradient(160deg,#fff,var(--card-2));border:1px solid var(--line);overflow:hidden;box-shadow:var(--shadow-sm);}
.frag .flines{position:absolute;inset:0;width:100%;height:100%;}
.ftile{position:absolute;background:#fff;border:1px solid var(--line-strong);border-radius:10px;padding:8px 12px;font-size:11.5px;font-weight:700;color:var(--ink-dim);box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:7px;z-index:2;}
.ftile .fd{width:8px;height:8px;border-radius:2px;}
.frag .fcenter{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:3;background:var(--amber-soft);border:1px solid rgba(192,112,0,.3);color:var(--amber);font-size:10.5px;font-weight:800;padding:7px 12px;border-radius:99px;letter-spacing:.02em;}
.frag .fcap{position:absolute;left:16px;bottom:12px;font-size:10.5px;color:var(--muted);z-index:2;}

/* ============ CHART ============ */
.chartwrap{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 28px 20px;box-shadow:var(--shadow-sm);}
.chart-legend{display:flex;gap:22px;align-items:center;margin-bottom:8px;}
.chart-legend .lg{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-dim);font-weight:600;}
.chart-legend .sw{width:13px;height:13px;border-radius:3px;}
.chart-note{font-size:10.5px;color:var(--muted-2);font-style:italic;margin-top:10px;}

/* ============ HERO (cover / closing) ============ */
.cover-canvas{position:absolute;inset:0;z-index:0;}
.cover-inner{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;}
.cover-badge{align-self:flex-start;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);padding:7px 15px;border:1px solid var(--teal-line);border-radius:99px;background:var(--teal-soft);}
.cover-h{font-family:var(--serif);font-weight:600;font-size:70px;line-height:.99;letter-spacing:-.025em;color:var(--ink);margin:0;}
.cover-h .g{background:linear-gradient(100deg,var(--teal),var(--cyan));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.cover-sub{font-size:21px;color:var(--ink-dim);max-width:56ch;line-height:1.5;margin:22px 0 0;}
.cover-meta{display:flex;gap:30px;align-items:center;font-size:13px;color:var(--muted);flex-wrap:wrap;}
.cover-meta .mi{display:flex;align-items:center;gap:8px;}
.cover-meta .mi svg{width:15px;height:15px;stroke:var(--teal);}
.chips{display:flex;gap:12px;flex-wrap:wrap;}
.chips span{font-size:12.5px;font-weight:600;color:var(--ink-dim);padding:8px 16px;border:1px solid var(--line);border-radius:99px;background:#fff;box-shadow:var(--shadow-sm);}

/* ============ NAV CHROME ============ */
#progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--cyan),var(--mint));z-index:50;transition:width .4s ease;}
#nav{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:50;display:flex;align-items:center;gap:16px;background:#fff;border:1px solid var(--line);border-radius:99px;padding:8px 16px;box-shadow:var(--shadow);opacity:.5;transition:opacity .3s;}
#nav:hover{opacity:1;}
#nav button{background:none;border:none;color:var(--ink);cursor:pointer;padding:5px;display:grid;place-items:center;border-radius:8px;}
#nav button:hover{background:var(--teal-soft);}
#nav button svg{width:17px;height:17px;stroke:currentColor;}
#nav .count{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;letter-spacing:.05em;min-width:44px;text-align:center;}
#nav .count b{color:var(--teal);}
#dots{display:flex;gap:6px;align-items:center;}
#dots .d{width:6px;height:6px;border-radius:50%;background:var(--muted-2);cursor:pointer;transition:all .25s;padding:0;border:none;}
#dots .d.on{background:var(--teal);width:20px;border-radius:99px;}
.hint{position:fixed;bottom:26px;right:26px;z-index:50;font-size:11px;color:var(--muted-2);letter-spacing:.03em;opacity:.7;}

/* ============ PRINT ============ */
@media print{
  @page{size:1280px 720px;margin:0;}
  body{overflow:visible;background:#fff;}
  #viewport{position:static;display:block;}
  #stage{width:1280px;height:720px;transform:none!important;box-shadow:none;border-radius:0;}
  .slide{position:relative;opacity:1!important;visibility:visible!important;page-break-after:always;height:720px;}
  #nav,#progress,.hint{display:none!important;}
}
</style>

<script>
/* ============ ICONS ============ */

  handshake:'<path d="M8 11l2-2 3 3 3-3 2 2M2 12l4-4h5l2 2M22 12l-4-4"/><path d="M6 8v6l4 4 2-2"/>',
  megaphone:'<path d="M3 11v2a1 1 0 0 0 1 1h2l5 4V6L6 10H4a1 1 0 0 0-1 1z"/><path d="M15 8a4 4 0 0 1 0 8"/>',
  book:'<path d="M4 5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2z"/><path d="M4 5v14"/>',

};
const svg=(p,cls='')=>'<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="'+cls+'">'+p+'</svg>';

const MARK = '<span class="glyph"><svg viewBox="0 0 40 40" fill="none"><circle cx="9" cy="12" r="3.4" fill="#006875"/><circle cx="30" cy="9" r="2.6" fill="#0f9d63"/><circle cx="31" cy="28" r="3" fill="#00a6bd"/><circle cx="13" cy="30" r="2.4" fill="#00cfe8"/><path d="M9 12L30 9M9 12L31 28M30 9L31 28M13 30L9 12M13 30L31 28" stroke="#006875" stroke-width="1.3" opacity=".4"/></svg></span>';

const mockDash = `<div class="mkwin"><div class="mkbar"><span class="mkdot on"></span><span class="mktitle">Operations dashboard</span></div>

/* ============ CHART: Enterprise vs Small Business ============ */
function chartSVG(){
  const data=[{c:'Using AI in the business',ent:40,sme:12},{c:'Dedicated gen-AI team',ent:62,sme:23},{c:'AI in daily operations',ent:37,sme:12}];
  const W=980,H=300,L=42,R=18,T=18,B=46, pw=W-L-R, ph=H-T-B;
  const y=v=>T+ph-ph*(v/100);
  let g='';
  for(let v=0;v<=100;v+=25){g+='<line x1="'+L+'" y1="'+y(v)+'" x2="'+(W-R)+'" y2="'+y(v)+'" stroke="#e4ebee" stroke-width="1"/>'
    +'<text x="'+(L-8)+'" y="'+(y(v)+3.5)+'" text-anchor="end" font-size="10" fill="#8fa0aa" font-family="Plus Jakarta Sans">'+v+'%</text>';}
  const gW=pw/data.length, bw=52, gap=14;
  data.forEach((d,i)=>{
    const cx=L+gW*i+gW/2, x1=cx-bw-gap/2, x2=cx+gap/2;
    const hE=ph*(d.ent/100), hS=ph*(d.sme/100);
    g+='<rect x="'+x1+'" y="'+y(d.ent)+'" width="'+bw+'" height="'+hE+'" rx="4" fill="#006875"/>';
    g+='<rect x="'+x2+'" y="'+y(d.sme)+'" width="'+bw+'" height="'+hS+'" rx="4" fill="#00c2dd"/>';
    g+='<text x="'+(x1+bw/2)+'" y="'+(y(d.ent)-7)+'" text-anchor="middle" font-size="12" font-weight="700" fill="#00505a" font-family="Plus Jakarta Sans">'+d.ent+'%</text>';
    g+='<text x="'+(x2+bw/2)+'" y="'+(y(d.sme)-7)+'" text-anchor="middle" font-size="12" font-weight="700" fill="#0a7f93" font-family="Plus Jakarta Sans">'+d.sme+'%</text>';
    g+='<text x="'+cx+'" y="'+(H-26)+'" text-anchor="middle" font-size="11.5" fill="#33505f" font-family="Plus Jakarta Sans">'+d.c+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;">'+g+'</svg>';
}

let cnum = 0;

slides.forEach((s,i)=>{
  const el = document.createElement('section');
  el.className = 'slide'+(s.cls?' '+s.cls:'')+(i===0?' active':'');
  let markup;
  if(s.raw){ el.style.padding='0'; markup = s.html; }
  else {
    cnum++;
    const numLabel = (cnum<10?'0'+cnum:cnum)+' / '+contentTotal;
    markup = HEADER
      + (s.title?'<h1 class="title">'+s.title+'</h1>':'')

/* ============ NAV ============ */
let cur = 0;
const els = Array.prototype.slice.call(document.querySelectorAll('.slide'));
const dots = document.getElementById('dots');
els.forEach((_,i)=>{const d=document.createElement('button');d.className='d'+(i===0?' on':'');d.setAttribute('aria-label','Go to slide '+(i+1));d.onclick=()=>go(i);dots.appendChild(d);});
document.getElementById('tot').textContent = els.length;
const dotEls=Array.prototype.slice.call(dots.children);

function go(n){
  n=Math.max(0,Math.min(els.length-1,n));
  els[cur].classList.remove('active');dotEls[cur].classList.remove('on');
  cur=n;
  els[cur].classList.add('active');dotEls[cur].classList.add('on');
  document.getElementById('cur').textContent=cur+1;
  document.getElementById('progress').style.width=((cur+1)/els.length*100)+'%';
}
document.getElementById('next').onclick=()=>go(cur+1);
document.getElementById('prev').onclick=()=>go(cur-1);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();go(cur+1);}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(cur-1);}
  else if(e.key==='Home'){go(0);} else if(e.key==='End'){go(els.length-1);}
  else if(e.key==='f'||e.key==='F'){if(!document.fullscreenElement){document.documentElement.requestFullscreen();}else{document.exitFullscreen();}}
});
document.getElementById('progress').style.width=(1/els.length*100)+'%';

/* ============ SCALE ============ */
const stageEl = document.getElementById('stage');
function fit(){
  const s=Math.min(window.innerWidth/1280,window.innerHeight/720)*0.94;
  stageEl.style.transform='scale('+s+')';
}
window.addEventListener('resize',fit);fit();

/* ============ COVER CANVAS (connected nodes = systems motif) ============ */
const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
Array.prototype.slice.call(document.querySelectorAll('.cover-canvas')).forEach(cv=>{
  const ctx=cv.getContext('2d');cv.width=1280;cv.height=720;
  const N=42,nodes=[];
  for(let i=0;i<N;i++)nodes.push({x:(i*137.5)%1280,y:(i*263.7)%720,vx:((i%7)-3)*.05,vy:((i%5)-2)*.05,r:(i%3)*0.7+1});
  function draw(){
    ctx.clearRect(0,0,1280,720);
    for(let i=0;i<N;i++){const a=nodes[i];
      for(let j=i+1;j<N;j++){const b=nodes[j];const dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy);
        if(d<175){ctx.strokeStyle='rgba(0,104,117,'+(0.11*(1-d/175))+')';ctx.lineWidth=.7;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}
    }
    for(let k=0;k<N;k++){const n=nodes[k];ctx.fillStyle='rgba(0,104,117,.28)';ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,7);ctx.fill();
      if(!reduce){n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>1280)n.vx*=-1;if(n.y<0||n.y>720)n.vy*=-1;}}
    if(!reduce)requestAnimationFrame(draw);
  }
  draw();
});
</script>
